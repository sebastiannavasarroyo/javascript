<!DOCTYPE html>
<html lang="en">
<head>
    <title>DIV y SPAN</title>
    <link rel="stylesheet" href="misEstilos.css">
</head>
<body>
    <main>
        <div>
            <h2>Operaciones matematicas</h2>
            <p>Las matematicas son importantes.</p>
            <p>Nos permiten hacer calculos.</p>
            <p>Estas son algunas de las mas basicas:</p>
            <div class="calculo">
                <p>5 + 8 = <span class="resultado">13</span></samp></p>
                <p>10 - 6 = <span class="resultado">4</span></samp></p>
                <p>3 x 10= <span class="resultado">30</span></samp></p>
            </div>
            <p>Existen muchas operaciones distintas</p>
            <p>Pronto veremos otras mas complejos.</p>
        </div>
    </main>
</body>
</html>
