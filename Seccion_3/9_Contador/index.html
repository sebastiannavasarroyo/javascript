<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Regresivo</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-top: 50px;
        }
        #contador {
            font-size: 2em;
            margin: 20px;
        }
        button {
            font-size: 1em;
            padding: 10px;
            margin: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    
    <h1>Contador Regresivo</h1>
    <div id="Contador">30</div>
    <button onclick="iniciarContador()">Iniciar</button>
    <button onclick="DetenerContador()">Detener</button>
    <button onclick="ReiniciarContador()">Reiniciar</button>

    <script>
        let tiempo = 30;
        let intervalo;

        function actualizarContador() {
            document.getElementById("Contador").textContent = tiempo;
        }

        function contador() {
            if (tiempo > 0){
                tiempo--;
                console.log(tiempo)
                actualizarContador()
            }else{
                DetenerContador();
                alert("¡Tiempo terminado!")
            }
        }

        function iniciarContador(){
            if (!intervalo){
                intervalo = setInterval(contar,1000);
            }    
        }

        function DetenerContador() {
            clearInterval(intervalo);
            intervalo = null;
        }

        function ReiniciarContador() {
            DetenerContador();
            tiempo = 30;
            actualizarContador();
        }

        actualizarContador
    </script>
</body>
</html>
