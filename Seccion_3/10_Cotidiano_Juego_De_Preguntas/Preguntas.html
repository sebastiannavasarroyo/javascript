<!DOCTYPE html>
<html lang="en">

<head>
    <title>Cotidiano Juego de Preguntas</title>
    <Link rel="stylesheet" href="misEstilos.css">
</head>
<body onload="iniciarContador()">

<div id="Contador">30</div>


    <p><h1>Contesta las siguentes preguntas con tiempo</h1></p>
    <p><h2>Se rápido!</h2></p><br>
    <p><h3>¿Cuanto es 5x5?</h3></p>
    <input type="text" id="25">
    <p><h3>¿Cuál es el país más grande del mundo por territorio?</h3></p>
    <input type="text" id="Rusia">
    <p><h3>¿Cuál es el órgano más grande del cuerpo humano?</h3></p>
    <input type="text" id="Piel">
    <p><h3>¿Cuál es el río más largo del mundo?</h3></p>
    <input type="text" id="Amazonas">
    <p><h3>¿Cuál es la capital de Japón?</h3></p>
    <input type="text" id="Tokio">
    <br>
    <br>
    <button onclick="DetenerContador()">Terminar</button>
    <button onclick="ReiniciarContador()">Volver a intentar</button>



    <script>
        let tiempo = 30;
        let intervalo;

        function actualizarContador() {
            document.getElementById("Contador").textContent = tiempo;
        }

        function contar() {
            if (tiempo > 0){
                tiempo--;
                console.log(tiempo)
                actualizarContador()
            } else {
                DetenerContador();
                alert("¡Game Over!")
            }
        }

        function iniciarContador() {
            if (!intervalo) {
                intervalo = setInterval(contar,1000);
            }    
        }

        function DetenerContador() {
            clearInterval(intervalo);
            intervalo = null;
        }

        function ReiniciarContador() {
            DetenerContador();
            tiempo = 30;
            actualizarContador();
        }

        actualizarContador();
    </script>

</body>
</html>
